app = 'ai-agent-terminal'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  APP_ENV = 'production'
  LOG_LEVEL = 'info'
  MAX_CONCURRENT_SESSIONS = '50'
  SANDBOX_TIMEOUT = '300'
  # REDIS_URL = ''
  # DATABASE_URL = ''
  VOLUME_PATH = '/data'
  AUTO_INSTALL_TOOLS = 'true'
  PERSIST_SESSIONS = 'true'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 2
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 100
    soft_limit = 50

[[vm]]
  size = 'performance-2x'
  memory = '4gb'
  cpu_kind = 'performance'
  cpus = 2

# VOLUME MOUNT - Persistent storage for each machine
# Each machine gets its own volume (1:1 mapping)
[[mounts]]
  source = 'agent_data'
  destination = '/data'
  initial_size = '10gb'

# Process groups for different machine types
[processes]
  app = 'uvicorn app.main:app --host 0.0.0.0 --port 8080 --workers 1'
  worker = 'celery -A app.core.celery_app worker --loglevel=info --concurrency=4'
  scheduler = 'celery -A app.core.celery_app beat --loglevel=info'

[[metrics]]
  port = 9091
  path = '/metrics'
