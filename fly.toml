# fly.toml app configuration file generated for ai-agent-terminal-sandbox-v2 on 2026-05-16T05:04:48Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ai-agent-terminal-sandbox-v2'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  APP_ENV = 'production'
  AUTO_INSTALL_TOOLS = 'true'
  DATABASE_URL = ''
  LOG_LEVEL = 'info'
  MAX_CONCURRENT_SESSIONS = '50'
  PERSIST_SESSIONS = 'true'
  REDIS_URL = ''
  SANDBOX_TIMEOUT = '300'
  VOLUME_PATH = '/data'

[processes]
  app = 'uvicorn app.main:app --host 0.0.0.0 --port 8080 --workers 1'
  scheduler = 'celery -A app.core.celery_app beat --loglevel=info'
  worker = 'celery -A app.core.celery_app worker --loglevel=info --concurrency=4'

[[mounts]]
  source = 'agent_data'
  destination = '/data'
  initial_size = '10gb'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 2
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 100
    soft_limit = 50

[[vm]]
  size = 'performance-2x'
  memory = '4gb'
  cpu_kind = 'performance'
  cpus = 2
  memory_mb = 4096

[[metrics]]
  port = 9091
  path = '/metrics'
